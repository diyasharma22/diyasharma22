name: Generate Snake Animation

on:
  schedule:
    - cron: "0 0 * * *"   # runs once a day
  workflow_dispatch: {}     # lets you also trigger it manually
  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Generate snake animation SVG
        uses: Platane/snk@v3
        id: snake-gif
        with:
          github_user_name: diyasharma22
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=#E75480,#800020&color_dots=#F0E6FA,#E0BBE4,#C8A2C8,#9B6FA3,#800020
            dist/github-contribution-grid-snake-dark.svg?color_snake=#E75480,#800020&color_dots=#2D1B2E,#6D213C,#9B6FA3,#C8A2C8,#E0BBE4

      - name: Push output to the "output" branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
